<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>2025県中学総体 水泳結果検索</title>
<style>
:root{
  color-scheme:dark;
  --bg-top:#16252f;--bg-bot:#0e1820;
  --panel:#1a2b39;--panel-2:#213544;--panel-3:#26404f;
  --line:rgba(255,255,255,.09);--line-2:rgba(255,255,255,.16);
  --ink:#e9eff4;--muted:#90a4b4;--faint:#6f8494;
  --accent:#34c2d4;--accent-ink:#06202a;
  --gold:#e0b14a;--gold-bg:rgba(224,177,74,.16);
  --women:#e2566b;--men:#4f93da;
  --r:16px;--r-sm:11px;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;color:var(--ink);line-height:1.6;background:linear-gradient(180deg,var(--bg-top),var(--bg-bot) 62%) fixed;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.hero{background:linear-gradient(165deg,#1d3142,#16242f);border:1px solid var(--line-2);border-radius:20px;padding:18px;box-shadow:0 0 0 1px rgba(52,194,212,.08)}
.hero-top{display:flex;gap:14px;align-items:flex-start}
.appIcon{flex:0 0 auto;width:56px;height:56px;border-radius:15px;background:linear-gradient(160deg,#72d4d1,#3daabd);display:grid;place-items:center;font-size:28px}
.hero-head{flex:1 1 auto;min-width:0}
.hero-head h1{margin:0;font-size:clamp(19px,4.8vw,25px);font-weight:800;line-height:1.3;letter-spacing:0}
.badge{flex:0 0 auto;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(224,177,74,.4);border-radius:999px;padding:7px 14px;font-weight:800;font-size:13px;white-space:nowrap}
.hero-sub{color:#b6d8e5;font-size:13px;margin:7px 0 0}
.hero-desc{color:var(--muted);font-size:13.5px;margin:14px 0 0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:16px}
.stat{background:var(--panel-2);border:1px solid var(--line);border-radius:13px;padding:12px 5px;text-align:center}
.stat .num{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums}
.stat .lab{color:var(--muted);font-size:11.5px;margin-top:2px}
.tabs{display:flex;gap:8px;margin:14px 0 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border:1px solid var(--line-2);border-radius:16px;background:rgba(26,43,57,.9)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:92px;min-height:68px;background:transparent;border:0;border-right:1px solid var(--line);color:var(--muted);font-weight:800;font-size:13px;cursor:pointer}
.tab:last-child{border-right:0}
.tab .ic{font-size:18px}
.tab.active{background:linear-gradient(160deg,#4aa5bd,#2786a0);color:#06202a}
main{margin-top:16px}
.panel{display:none;animation:fade .22s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:12px}
.intro{background:linear-gradient(165deg,rgba(35,67,79,.75),rgba(19,37,50,.9));border-color:rgba(52,194,212,.22)}
.kicker{display:inline-block;background:rgba(80,128,140,.45);color:#d8f6f8;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:900;letter-spacing:.05em}
.card h2{margin:12px 0 0;font-size:19px;font-weight:850;line-height:1.45}
.card h3{margin:0;font-size:16px;font-weight:800}
.lead{color:var(--muted);font-size:13.5px;margin:10px 0 0}
.toolbar{display:grid;gap:11px;margin-bottom:14px}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg button,.gp{min-height:48px;background:var(--panel);border:1px solid var(--line-2);border-radius:14px;color:var(--muted);font-weight:800;font-size:14px;cursor:pointer}
.seg button.active,.gp.active{background:linear-gradient(160deg,#4aa5bd,#2786a0);border-color:transparent;color:#06202a}
.genderRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gp{display:flex;align-items:center;justify-content:center;gap:8px}
.dot,.gDot{display:inline-block;border-radius:50%}
.dot{width:12px;height:12px}.gDot{width:8px;height:8px;margin-right:6px;vertical-align:1px}
.dot.女子,.gDot.女子{background:var(--women)}.dot.男子,.gDot.男子{background:var(--men)}.dot.all{background:var(--accent)}
.searchRow{display:flex;gap:8px}
input,select{width:100%;min-height:52px;background:var(--panel);border:1px solid var(--line-2);border-radius:14px;padding:12px 15px;font-size:16px;color:var(--ink)}
input::placeholder{color:var(--faint)}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,194,212,.18)}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 22px,calc(100% - 12px) 22px;background-size:6px 6px;background-repeat:no-repeat}
.searchBtn{flex:0 0 auto;min-width:74px;background:linear-gradient(160deg,#67cbd5,#37a7bd);border:0;border-radius:14px;color:#06202a;font-weight:900;font-size:15px;cursor:pointer}
.note{color:var(--faint);font-size:12px;margin:0 2px 12px}
.summary{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px}
.pill{background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:5px 12px;color:var(--muted);font-size:12px}
.qBadge{display:inline-flex;align-items:center;gap:4px;background:rgba(224,177,74,.16);border:1px solid rgba(224,177,74,.45);border-radius:999px;color:var(--gold);font-size:11px;font-weight:900;padding:3px 8px;white-space:nowrap}
.qualBlock{margin-top:12px}
.chipsRow{display:flex;gap:8px;margin:0 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.chipsRow::-webkit-scrollbar{display:none}
.schoolChip{flex:0 0 auto;background:var(--panel);border:1px solid var(--line-2);border-radius:999px;padding:8px 14px;color:var(--ink);font-size:13px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.schoolChip .n{display:inline-grid;place-items:center;min-width:20px;height:20px;border-radius:999px;background:var(--panel-3);color:var(--muted);font-size:11px;font-weight:900;padding:0 5px}
.schoolChip.active{background:linear-gradient(160deg,#4aa5bd,#2786a0);border-color:transparent;color:#06202a}.schoolChip.active .n{background:rgba(6,32,42,.25);color:#06202a}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sub{color:var(--muted);font-size:12px;margin-top:3px}
.gLabel.女子{color:var(--women);font-weight:800}.gLabel.男子{color:var(--men);font-weight:800}
.cnt{flex:0 0 auto;display:inline-grid;place-items:center;min-width:56px;height:38px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-weight:800;font-size:12px;padding:0 9px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:5px 10px;font-size:12px}
.chip .ev{color:var(--muted)}.chip .tm,.tm{font-weight:850;font-variant-numeric:tabular-nums}
.chip.g1{background:rgba(224,177,74,.15);border-color:rgba(224,177,74,.45)}.chip.g2{background:rgba(190,200,210,.12);border-color:rgba(190,200,210,.3)}.chip.g3{background:rgba(198,135,82,.15);border-color:rgba(198,135,82,.4)}
details.acc{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
details.acc>summary{list-style:none;cursor:pointer;padding:15px;display:flex;align-items:center;gap:10px;justify-content:space-between}
details.acc>summary::-webkit-details-marker{display:none}
.accTitle{display:flex;flex-direction:column;gap:3px;min-width:0}.accTitle strong{font-size:15.5px;font-weight:850}.chev{color:var(--muted);font-size:18px;transition:transform .2s}details.acc[open] .chev{transform:rotate(180deg)}
.accBody{padding:0 13px 13px;display:grid;gap:8px}
.result{display:flex;align-items:center;gap:11px;padding:10px 11px;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--r-sm)}
.result.r1{background:rgba(224,177,74,.13);border-color:rgba(224,177,74,.4)}.result.r2{background:rgba(190,200,210,.1);border-color:rgba(190,200,210,.28)}.result.r3{background:rgba(198,135,82,.13);border-color:rgba(198,135,82,.38)}
.rank{flex:0 0 auto;display:inline-grid;place-items:center;min-width:34px;height:34px;border-radius:10px;background:var(--panel-3);border:1px solid var(--line);color:var(--muted);font-weight:900;font-size:14px;font-variant-numeric:tabular-nums}
.rank.r1{background:var(--gold);border-color:var(--gold);color:#2a1c00}.rank.r2{background:#b9c2cb;border-color:#b9c2cb;color:#23292f}.rank.r3{background:#c08552;border-color:#c08552;color:#241200}
.who{flex:1 1 auto;min-width:0}.who .nm{font-weight:800;font-size:14.5px}.who .mt{color:var(--muted);font-size:11.5px}
.time{flex:0 0 auto;font-size:17px;font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap}
.members{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:7px;font-size:12px;color:var(--muted)}.members b{color:var(--ink);font-weight:700}
.standHead{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-weight:850;font-size:15.5px}
.standRow{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid var(--line)}.standRow:first-of-type{border-top:0}.standRow .team{flex:1 1 auto;font-weight:700;font-size:14.5px}.standRow .pts{flex:0 0 auto;font-weight:900;font-size:16px;font-variant-numeric:tabular-nums}.standRow .pts small{font-weight:700;color:var(--muted);font-size:11px;margin-left:2px}
.empty{padding:20px;border:1px dashed var(--line-2);border-radius:var(--r);color:var(--muted);text-align:center}
.footer{margin:24px 2px 8px;color:var(--faint);font-size:11.5px;line-height:1.7}
@media(max-width:520px){.wrap{padding:12px}.hero{padding:15px}.appIcon{width:48px;height:48px;border-radius:13px}.badge{padding:6px 11px}.stats{gap:7px}.stat .num{font-size:20px}.tab{min-width:84px}.members{grid-template-columns:1fr}.searchRow{align-items:stretch}.searchBtn{min-width:68px}}
</style>
</head>

<div class="wrap">
  <section class="hero">
    <div class="hero-top">
      <div class="appIcon">🏊</div>
      <div class="hero-head">
        <h1 id="appTitle"></h1>
        <p class="hero-sub" id="appSub"></p>
      </div>
      <span class="badge">大会結果</span>
    </div>
    <p class="hero-desc">公式結果PDFを基準に、個人・リレー・学校対抗得点をスマホで見やすく整理しています。</p>
    <div class="stats" id="stats"></div>
  </section>
  <nav class="tabs" id="tabs"></nav>
  <main>
    <section class="panel active" id="panel-search">
      <div class="card intro">
        <span class="kicker">SWIMMER SEARCH</span>
        <h2>選手・所属から結果をすぐ確認</h2>
        <p class="lead">学校名・クラブ名をタップすると、所属選手の個人結果とリレー結果をまとめて表示します。</p>
      </div>
      <div class="toolbar">
        <div class="seg" id="searchMode">
          <button data-mode="affiliation" class="active">学校・クラブ</button>
          <button data-mode="athlete">選手名</button>
        </div>
        <div class="genderRow" id="genderRow">
          <button class="gp active" data-gender=""><span class="dot all"></span>全員</button>
          <button class="gp" data-gender="女子"><span class="dot 女子"></span>女子</button>
          <button class="gp" data-gender="男子"><span class="dot 男子"></span>男子</button>
        </div>
        <select id="searchGrade"><option value="">学年すべて</option><option value="中3">中3</option><option value="中2">中2</option><option value="中1">中1</option></select>
        <div class="searchRow">
          <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="学校名・クラブ名・選手名">
          <button class="searchBtn" id="searchBtn">検索</button>
        </div>
      </div>
      <p class="note" id="searchNote"></p>
      <div class="chipsRow" id="schoolChips"></div>
      <div class="summary" id="searchSummary"></div>
      <div id="searchResult"></div>
    </section>
    <section class="panel" id="panel-events">
      <div class="toolbar">
        <select id="eventGender"><option value="">男女すべて</option><option value="女子">女子</option><option value="男子">男子</option></select>
        <select id="eventStroke"><option value="">泳法すべて</option></select>
      </div>
      <p class="note">競技順序PDFの決勝・タイム決勝No順です。順位は組順位ではなく種目別総合順位です。</p>
      <div id="eventList"></div>
    </section>
    <section class="panel" id="panel-relay"><p class="note">リレー順位・最終タイム・第1泳者・メンバーを表示します。</p><div id="relayList"></div></section>
    <section class="panel" id="panel-standings"><p class="note">大会結果PDFの学校対抗得点です。</p><div id="standingsList"></div></section>
    <section class="panel" id="panel-records"><p class="note">各個人種目2位まで、リレー2位までを九州中学大会の出場圏として一覧表示します。正式決定は主催者発表を確認してください。</p><div id="recordList"></div></section>
  </main>
  <p class="footer" id="footer"></p>
</div>

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
const gs=g=>Number(String(g||'').replace(/[^0-9]/g,''))||0;
const gen=g=>g==='女子'?0:g==='男子'?1:2;
const kh=v=>v.replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
const norm=v=>kh(String(v||'').normalize('NFKC').toLowerCase()).replace(/[\s　・･.．]/g,'');
const tb=t=>String(t||'').normalize('NFKC').replace(/\s*中\s*$/u,'').trim();
const tal=t=>{const b=tb(t);return[...new Set([t,b,`${b}中`,`${b} 中`].filter(Boolean))];};
const tsrch=t=>tal(t).map(norm).join(' ');
const med=r=>r===1?'1':r===2?'2':r===3?'3':'';
function records(){const a=[];DATA.events.forEach(ev=>ev.entries.forEach(en=>(en.recordTags||[]).forEach(tag=>a.push({ev,en,tag}))));return a;}
function qualifiers(){return DATA.events.slice().sort((a,b)=>a.programOrder-b.programOrder||gen(a.gender)-gen(b.gender)).map(ev=>({...ev,entries:ev.entries.filter(en=>en.status==='OK'&&en.rank&&en.rank<=2).sort((a,b)=>a.rank-b.rank)})).filter(ev=>ev.entries.length);}
function buildAthletes(){const m=new Map();DATA.events.filter(e=>e.type==='individual').forEach(ev=>ev.entries.forEach(en=>{const k=[en.gender,en.name,en.team,en.grade].join('|');if(!m.has(k))m.set(k,{name:en.name,kana:en.kana||'',gender:en.gender,grade:en.grade,team:en.team,results:[]});m.get(k).results.push({eventName:ev.eventName,programLabel:ev.programLabel,rank:en.rank,time:en.time,status:en.status});}));return[...m.values()].sort((a,b)=>gen(a.gender)-gen(b.gender)||gs(b.grade)-gs(a.grade)||norm(a.team).localeCompare(norm(b.team),'ja')||norm(a.name).localeCompare(norm(b.name),'ja'));}
function buildAff(){const m=new Map();const ens=t=>{const b=tb(t);if(!m.has(b))m.set(b,{name:b,aliases:new Set(),athletes:new Map(),relays:[]});tal(t).forEach(a=>m.get(b).aliases.add(a));return m.get(b);};DATA.events.forEach(ev=>{if(ev.type==='individual'){ev.entries.forEach(en=>{const it=ens(en.team);const k=[en.gender,en.name,en.grade].join('|');if(!it.athletes.has(k))it.athletes.set(k,{name:en.name,gender:en.gender,grade:en.grade,team:en.team,results:[]});it.athletes.get(k).results.push({eventName:ev.eventName,programLabel:ev.programLabel,rank:en.rank,time:en.time,status:en.status});});}else{ev.entries.forEach(en=>{const it=ens(en.team);it.relays.push({eventName:ev.eventName,gender:ev.gender,rank:en.rank,time:en.time,status:en.status,firstSplit:en.firstSplit,members:en.members,programLabel:ev.programLabel});});}});return[...m.values()].map(it=>({name:it.name,aliases:[...it.aliases],athletes:[...it.athletes.values()].sort((a,b)=>gen(a.gender)-gen(b.gender)||gs(b.grade)-gs(a.grade)||norm(a.name).localeCompare(norm(b.name),'ja')),relays:it.relays,searchText:norm([...it.aliases].join(' '))})).sort((a,b)=>(b.athletes.length+b.relays.length)-(a.athletes.length+a.relays.length)||norm(a.name).localeCompare(norm(b.name),'ja'));}

function renderMeta(){const m=DATA.metadata;$('#appTitle').textContent=m.appTitle||m.title;$('#appSub').textContent=`${m.date} / ${m.venue}`;const indR=DATA.events.filter(e=>e.type==='individual').reduce((s,e)=>s+e.entries.length,0);const relR=DATA.events.filter(e=>e.type==='relay').reduce((s,e)=>s+e.entries.length,0);const qR=qualifiers().reduce((s,e)=>s+e.entries.length,0);$('#stats').innerHTML=[['全種目',DATA.events.length],['個人結果',indR],['リレー',relR],['九州出場圏',qR]].map(([l,n])=>`<div class="stat"><div class="num">${n}</div><div class="lab">${l}</div></div>`).join('');$('#footer').textContent=`${m.sourceNote||''} ${m.divisionPolicy||''}`;}

function fGrade(){return $('#searchGrade').value;} function fQ(){return norm($('#searchInput').value);}
function renderSearch(){$('#searchInput').placeholder=mode==='affiliation'?'学校名・クラブ名で検索':'選手名・所属名で検索';$('#searchNote').textContent=mode==='affiliation'?'学校・クラブをタップで所属選手と結果を表示。検索欄で所属タブを絞れます。':'氏名や所属で選手を検索。色付きは1-3位です。';$('#schoolChips').style.display=mode==='affiliation'?'flex':'none';mode==='affiliation'?renderAff():renderAthletes();}
function renderAthletes(){const q=fQ(),gr=fGrade();const list=ATHLETES.filter(a=>{const hay=norm([a.name,a.kana,a.gender,a.grade,a.team].join(' '))+' '+tsrch(a.team);return(!q||hay.includes(q))&&(!gender||a.gender===gender)&&(!gr||a.grade===gr);});$('#searchSummary').innerHTML=`<span class="pill">${list.length} 選手</span>`;$('#searchResult').innerHTML=list.length?list.map(a=>`<div class="card"><div class="row"><div><h3><span class="gDot ${a.gender}"></span>${esc(a.name)}</h3><div class="sub"><span class="gLabel ${a.gender}">${a.gender}</span> ・ ${esc(a.team)} ・ ${esc(a.grade)}</div></div><span class="cnt">${a.results.length} 種目</span></div><div class="chips">${a.results.map(eChip).join('')}</div></div>`).join(''):`<div class="empty">該当する選手が見つかりません。</div>`;}
function renderAff(){const q=fQ(),gr=fGrade();const tabs=AFF.filter(a=>!q||a.searchText.includes(q)||a.athletes.some(x=>norm(x.name).includes(q)));if(school&&!tabs.some(a=>a.name===school))school='';$('#schoolChips').innerHTML=tabs.length?tabs.map(a=>`<button class="schoolChip ${a.name===school?'active':''}" data-school="${esc(a.name)}">${esc(a.name)}<span class="n">${a.athletes.length}</span></button>`).join(''):`<span class="empty" style="padding:8px 12px">該当する所属なし</span>`;$$('[data-school]').forEach(b=>b.onclick=()=>{school=b.dataset.school===school?'':b.dataset.school;renderAff();if(school)$('#searchSummary').scrollIntoView({behavior:'smooth',block:'nearest'});});if(!school){$('#searchSummary').innerHTML=`<span class="pill">${tabs.length} 所属</span><span class="pill">学校・クラブを選択</span>`;$('#searchResult').innerHTML=`<div class="empty">上の学校・クラブ名をタップしてください。</div>`;return;}const a=AFF.find(x=>x.name===school);const ath=a.athletes.filter(x=>(!gender||x.gender===gender)&&(!gr||x.grade===gr));const rel=a.relays.filter(r=>!gender||r.gender===gender);$('#searchSummary').innerHTML=`<span class="pill">${esc(a.name)}</span><span class="pill">${ath.length} 選手</span><span class="pill">${rel.length} リレー</span>`;if(!ath.length&&!rel.length){$('#searchResult').innerHTML=`<div class="empty">条件に合う選手・リレーがありません。</div>`;return;}$('#searchResult').innerHTML=ath.map(x=>`<div class="card"><div class="row"><div><h3><span class="gDot ${x.gender}"></span>${esc(x.name)}</h3><div class="sub"><span class="gLabel ${x.gender}">${x.gender}</span> ・ ${esc(x.grade)}</div></div><span class="cnt">${x.results.length} 種目</span></div><div class="chips">${x.results.map(eChip).join('')}</div></div>`).join('')+rel.map(r=>`<div class="card"><div class="row"><h3><span class="gDot ${r.gender}"></span>${esc(r.eventName)}</h3><span class="cnt">${r.rank?`${r.rank}位`:esc(r.status)}</span></div><div class="sub">${esc(r.programLabel)} ・ <span class="tm">${esc(r.time)}</span> ・ 第1泳者 ${esc(r.firstSplit||'-')}</div><div class="members">${r.members.map((m,i)=>`<span>${i+1}. <b>${esc(m.name)}</b> ${esc(m.grade)}</span>`).join('')}</div></div>`).join('');}
function setupEv(){const st=[...new Set(DATA.events.map(e=>e.stroke))];$('#eventStroke').innerHTML='<option value="">泳法すべて</option>'+st.map(s=>`<option>${esc(s)}</option>`).join('');}
const rRow=en=>{const c=med(en.rank);return`<div class="result ${c?`r${c}`:''}"><span class="rank ${c?`r${c}`:''}">${en.rank||'-'}</span><div class="who"><div class="nm">${esc(en.name)} ${en.rank&&en.rank<=2?'<span class="qBadge">九州出場圏</span>':''}</div><div class="mt">${esc(en.team)} ・ ${esc(en.grade)}</div></div><div class="time">${esc(en.time||en.status)}</div></div>`;};
const rRelay=en=>{const c=med(en.rank);return`<div class="result ${c?`r${c}`:''}" style="flex-wrap:wrap"><span class="rank ${c?`r${c}`:''}">${en.rank||'-'}</span><div class="who"><div class="nm">${esc(en.team)} ${en.rank&&en.rank<=2?'<span class="qBadge">九州出場圏</span>':''}</div><div class="mt">第1泳者 ${esc(en.firstSplit||'-')}</div></div><div class="time">${esc(en.time||en.status)}</div><div class="members" style="flex-basis:100%">${en.members.map((m,i)=>`<span>${i+1}. <b>${esc(m.name)}</b> ${esc(m.grade)}</span>`).join('')}</div></div>`;};
function evCard(ev){const ok=ev.entries.filter(e=>e.status==='OK').sort((a,b)=>(a.rank||999)-(b.rank||999));const rows=(ev.type==='relay'?ok.map(rRelay):ok.map(rRow)).join('');return`<details class="acc"><summary><span class="accTitle"><strong><span class="gDot ${ev.gender}"></span>${esc(ev.distance)} ${esc(ev.stroke)}</strong><span class="sub">${esc(ev.programLabel)} ・ ${esc(ev.programRound||ev.resultType)} ・ ${esc(ev.programDay||'')}</span></span><span class="chev">⌄</span></summary><div class="accBody">${rows||'<div class="empty">結果なし</div>'}</div></details>`;}
function renderEv(){const g=$('#eventGender').value,s=$('#eventStroke').value;const list=DATA.events.filter(e=>e.type==='individual'&&(!g||e.gender===g)&&(!s||e.stroke===s)).sort((a,b)=>a.programOrder-b.programOrder||gen(a.gender)-gen(b.gender));$('#eventList').innerHTML=list.length?list.map(evCard).join(''):`<div class="empty">該当する種目がありません。</div>`;}
function renderRelay(){const list=DATA.events.filter(e=>e.type==='relay').sort((a,b)=>a.programOrder-b.programOrder||gen(a.gender)-gen(b.gender));$('#relayList').innerHTML=list.length?list.map(evCard).join(''):`<div class="empty">リレー結果はありません。</div>`;}
function renderStand(){$('#standingsList').innerHTML=DATA.points.length?DATA.points.map(grp=>`<div class="card"><div class="standHead"><span class="gDot ${grp.gender}"></span><span class="gLabel ${grp.gender}">${esc(grp.gender)}</span> 学校対抗得点</div>${grp.entries.map(e=>{const c=med(e.rank);return`<div class="standRow"><span class="rank ${c?`r${c}`:''}">${e.rank}</span><span class="team">${esc(e.team)}</span><span class="pts">${esc(e.points)}<small> 点</small></span></div>`;}).join('')}</div>`).join(''):`<div class="empty">学校対抗得点はありません。</div>`;}
function renderRecords(){const qs=qualifiers();const ind=qs.filter(e=>e.type==='individual'), rel=qs.filter(e=>e.type==='relay');const summary=`<div class="card intro"><span class="kicker">KYUSHU QUALIFIERS</span><h2>九州中学大会 出場圏</h2><p class="lead">個人は各種目2位まで、リレーは各種目2位までをNo順で表示しています。</p><div class="summary qualBlock"><span class="pill">個人 ${ind.reduce((s,e)=>s+e.entries.length,0)}名</span><span class="pill">リレー ${rel.reduce((s,e)=>s+e.entries.length,0)}チーム</span></div></div>`;$('#recordList').innerHTML=summary+qs.map(ev=>`<details class="acc" open><summary><span class="accTitle"><strong><span class="gDot ${ev.gender}"></span>${esc(ev.distance)} ${esc(ev.stroke)}</strong><span class="sub">${esc(ev.programLabel)} ・ ${esc(ev.programRound||ev.resultType)} ・ ${esc(ev.programDay||'')}</span></span><span class="chev">⌄</span></summary><div class="accBody">${ev.type==='relay'?ev.entries.map(rRelay).join(''):ev.entries.map(rRow).join('')}</div></details>`).join('');}
$('#searchMode').onclick=e=>{const b=e.target.closest('[data-mode]');if(!b)return;mode=b.dataset.mode;$$('#searchMode button').forEach(x=>x.classList.toggle('active',x===b));renderSearch();};
$('#genderRow').onclick=e=>{const b=e.target.closest('[data-gender]');if(!b)return;gender=b.dataset.gender;$$('#genderRow .gp').forEach(x=>x.classList.toggle('active',x===b));renderSearch();};
$('#searchBtn').onclick=()=>{$('#searchInput').blur();renderSearch();};$('#searchInput').oninput=renderSearch;$('#searchGrade').onchange=renderSearch;$('#eventGender').onchange=renderEv;$('#eventStroke').onchange=renderEv;
renderMeta();buildTabs();setupEv();renderSearch();renderEv();renderRelay();renderStand();renderRecords();
</script>
</body>
</html>
